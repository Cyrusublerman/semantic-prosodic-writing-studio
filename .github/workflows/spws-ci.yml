name: SPWS CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install packages
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e "packages/contracts/core[test]" \
            -e packages/domain -e packages/orchestration -e packages/pipelines \
            -e packages/storage -e packages/ingestion -e packages/semantics \
            -e packages/preprocessing -e packages/planning -e packages/generation \
            -e packages/analysis -e packages/revision -e packages/adapters/pkl \
            -e packages/adapters/wordrare -e packages/spws_cli -e packages/wordrare \
            fastapi httpx uvicorn sqlalchemy alembic pytest jsonschema hypothesis pyyaml python-frontmatter
      - name: Pytest (hash embeddings — smoke)
        run: |
          . .venv/bin/activate
          pytest -q \
            tests/contract \
            tests/integration \
            tests/end_to_end \
            tests/component \
            tests/stress \
            packages/contracts/core/tests \
            packages/adapters/pkl/tests \
            packages/adapters/wordrare/tests \
            --ignore=tests/end_to_end/test_studio_playwright.py
      - name: Install Playwright Chromium + run studio e2e
        run: |
          . .venv/bin/activate
          uv pip install playwright uvicorn
          python -m playwright install --with-deps chromium
          pytest -q tests/end_to_end/test_studio_playwright.py
      - name: LLM socket fail-closed
        run: |
          . .venv/bin/activate
          python - <<'PY'
          from spws_orchestration.llm_socket import assert_method_family_allowed, LLMMethodFamilyDisabled
          assert_method_family_allowed("rare_lexical")
          try:
              assert_method_family_allowed("llm_bounded")
          except LLMMethodFamilyDisabled:
              pass
          else:
              raise SystemExit("llm_bounded must fail closed")
          print("ok")
          PY

  test-minilm-required:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install with embeddings
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e "packages/contracts/core[test]" \
            -e packages/domain -e packages/orchestration -e packages/pipelines \
            -e packages/storage -e packages/ingestion -e packages/semantics \
            -e packages/preprocessing -e packages/planning -e packages/generation \
            -e packages/analysis -e packages/revision -e packages/adapters/pkl \
            -e packages/adapters/wordrare -e packages/spws_cli -e packages/wordrare \
            -e ".[embeddings]" sqlalchemy alembic pytest
      - name: MiniLM meaning gauge (require_model)
        run: |
          . .venv/bin/activate
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory
          from spws_contracts_core.domain import PrivacyState, RightsState, SimilarityQuery
          from spws_semantics import MeaningGauge
          with TemporaryDirectory() as tmp:
              gauge = MeaningGauge(Path(tmp), debug_hash_embeddings=False, require_model=True)
              gauge.index_text(
                  "Meter shapes rhythm in poetry.",
                  rights=RightsState.PUBLIC,
                  privacy=PrivacyState.PUBLIC,
              )
              gauge.index_text(
                  "The quiet river remembers autumn leaves.",
                  rights=RightsState.PUBLIC,
                  privacy=PrivacyState.PUBLIC,
              )
              hits = gauge.similar(SimilarityQuery(text="poetic meter and rhythm", result_limit=3))
              assert hits.hits, "MiniLM similarity must return hits"
              print("ok", len(hits.hits))
          PY
      - name: Golden tag/similarity tests
        run: |
          . .venv/bin/activate
          pytest -q tests/integration/test_meaning_tags_and_index.py

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and test studio-web
        working-directory: apps/studio-web
        run: |
          corepack enable
          pnpm install --frozen-lockfile || pnpm install
          pnpm test
          pnpm build
