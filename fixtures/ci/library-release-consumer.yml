# Proposed Library CI consumer workflow.
# Do NOT apply automatically. Promote via human-reviewed Library PR.
#
# Destination (proposed): Cyrusublerman/Library/.github/workflows/spws-contracts-consumer.yml
name: SPWS contract release consumer

on:
  workflow_dispatch:
    inputs:
      spws_release_tag:
        description: Pinned SPWS contracts release tag
        required: true
        type: string

jobs:
  validate-against-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download pinned SPWS contract release
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: Cyrusublerman/semantic-prosodic-writing-studio
          version: tags/${{ inputs.spws_release_tag }}
          file: compatibility-manifest.json
          target: /tmp/spws/compatibility-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert no unversioned SPWS checkout dependency
        run: |
          test -f /tmp/spws/compatibility-manifest.json
          python3 - <<'PY'
          import json
          data = json.load(open("/tmp/spws/compatibility-manifest.json"))
          assert "release" in data
          print("validated against release", data["release"])
          PY
