[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "spws-contracts-core"
version = "0.1.0.dev2"
description = "Reference implementation of the Semantic–Prosodic Writing Studio core object contract primitives."
readme = "README.md"
requires-python = ">=3.12,<3.15"
license = "LicenseRef-Proprietary"
authors = [{name = "Alexander Einoder"}]
dependencies = [
  "pydantic==2.13.4",
  "uuid-utils==0.17.0",
  "rfc8785==0.1.4",
  "packaging==25.0",
]

[project.optional-dependencies]
test = [
  "pytest==9.0.2",
  "hypothesis==6.156.6",
  "jsonschema==4.26.0",
  "build==1.3.0",
]

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
spws_contracts_core = ["data/*.json", "data/registry/*.json", "data/releases/*.zip"]

[tool.pytest.ini_options]
addopts = "-q --strict-markers"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["spws_contracts_core"]
