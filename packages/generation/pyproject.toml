[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "spws-generation"
version = "0.1.0"
description = "SPWS fragment collage and generation proposals"
requires-python = ">=3.12,<3.15"
dependencies = [
  "spws-contracts-core",
  "spws-semantics",
  "spws-planning",
  "spws-domain",
  "spws-orchestration",
]

[project.optional-dependencies]
wordrare = ["wordrare"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
