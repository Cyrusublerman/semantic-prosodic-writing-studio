[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "spws-orchestration"
version = "0.1.0"
description = "SPWS component registry and typed DAG pipeline executor"
requires-python = ">=3.12,<3.15"
dependencies = [
  "spws-contracts-core",
  "pydantic>=2.13",
  "pyyaml>=6.0",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
