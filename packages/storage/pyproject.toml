[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "spws-storage"
version = "0.1.0"
description = "SPWS XDG workspace object store"
requires-python = ">=3.12,<3.15"
dependencies = [
  "spws-contracts-core",
  "sqlalchemy>=2.0",
  "alembic>=1.13",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
