[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wordrare"
version = "0.1.0"
description = "WordRare lexical and prosodic poetry components for SPWS"
requires-python = ">=3.12,<3.15"
dependencies = [
  "sqlalchemy>=2.0",
  "python-dotenv>=1.0",
  "nltk>=3.8",
  "pronouncing>=0.2",
  "networkx>=3.0",
  "scikit-learn>=1.4",
]

[project.optional-dependencies]
embeddings = ["sentence-transformers>=3.0", "torch"]
api = ["fastapi>=0.110", "uvicorn>=0.27"]

[project.scripts]
wordrare = "wordrare.generation.engine:main"
wordrare-rewrite = "wordrare.generation.prose_rewrite:main"
wordrare-debug = "wordrare.ui.form_debugger:main"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
